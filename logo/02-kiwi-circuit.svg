<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Concept 2: Kiwi outline drawn as PCB traces -->
  <defs>
    <style>
      .trace { fill: none; stroke: #00b894; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .pad { fill: #00b894; }
      .via { fill: none; stroke: #00b894; stroke-width: 2; }
    </style>
  </defs>
  <!-- PCB background -->
  <rect x="10" y="10" width="180" height="180" rx="8" fill="#1a2332"/>
  <!-- Kiwi outline as circuit trace -->
  <path class="trace" d="
    M40,120
    L25,130
    L22,132
    L25,134
    L45,125
    C50,122 55,110 60,100
    C65,88 60,75 65,68
    C70,60 80,58 88,60
    C96,62 100,70 100,78
    C100,85 95,90 90,95
    C85,100 90,108 95,115
    C105,130 120,142 135,148
    C145,152 155,148 155,148
  "/>
  <!-- Body bottom trace -->
  <path class="trace" d="
    M60,100
    C65,108 70,118 80,128
    C90,138 100,142 110,145
    C120,148 130,148 135,148
  "/>
  <!-- Legs as traces going to pads -->
  <line class="trace" x1="95" y1="140" x2="90" y2="165"/>
  <line class="trace" x1="115" y1="145" x2="110" y2="165"/>
  <!-- PCB pads at feet -->
  <rect class="pad" x="84" y="162" width="12" height="8" rx="1"/>
  <rect class="pad" x="104" y="162" width="12" height="8" rx="1"/>
  <!-- Eye as a via -->
  <circle class="via" cx="78" cy="72" r="5"/>
  <circle class="pad" cx="78" cy="72" r="2"/>
  <!-- Corner pads for PCB feel -->
  <circle class="pad" cx="25" cy="25" r="4"/>
  <circle class="via" cx="25" cy="25" r="6"/>
  <circle class="pad" cx="175" cy="25" r="4"/>
  <circle class="via" cx="175" cy="25" r="6"/>
  <circle class="pad" cx="25" cy="175" r="4"/>
  <circle class="via" cx="25" cy="175" r="6"/>
  <circle class="pad" cx="175" cy="175" r="4"/>
  <circle class="via" cx="175" cy="175" r="6"/>
  <!-- Some decorative traces -->
  <line class="trace" stroke-width="1.5" x1="25" y1="25" x2="25" y2="55"/>
  <line class="trace" stroke-width="1.5" x1="175" y1="25" x2="175" y2="55"/>
  <line class="trace" stroke-width="1.5" x1="155" y1="148" x2="175" y2="148" />
  <line class="trace" stroke-width="1.5" x1="175" y1="148" x2="175" y2="175"/>
</svg>