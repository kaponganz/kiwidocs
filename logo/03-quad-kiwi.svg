<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Concept 3: Top-down quadcopter that reads as kiwi bird -->
  <defs>
    <style>
      .arm { stroke: #1a1a1a; stroke-width: 4; stroke-linecap: round; fill: none; }
      .motor { fill: #1a1a1a; }
      .prop-arc { fill: none; stroke: #00b894; stroke-width: 2.5; stroke-linecap: round; }
      .center { fill: #1a1a1a; }
      .beak { fill: #00b894; }
    </style>
  </defs>
  <!-- Arms from center -->
  <line class="arm" x1="100" y1="100" x2="50" y2="55"/>
  <line class="arm" x1="100" y1="100" x2="150" y2="55"/>
  <line class="arm" x1="100" y1="100" x2="50" y2="145"/>
  <line class="arm" x1="100" y1="100" x2="150" y2="145"/>
  <!-- Prop circles (arcs for motion feel) -->
  <circle class="prop-arc" cx="50" cy="55" r="28"/>
  <circle class="prop-arc" cx="150" cy="55" r="28"/>
  <circle class="prop-arc" cx="50" cy="145" r="28"/>
  <circle class="prop-arc" cx="150" cy="145" r="28"/>
  <!-- Motor hubs -->
  <circle class="motor" cx="50" cy="55" r="6"/>
  <circle class="motor" cx="150" cy="55" r="6"/>
  <circle class="motor" cx="50" cy="145" r="6"/>
  <circle class="motor" cx="150" cy="145" r="6"/>
  <!-- Center body — kiwi-shaped oval -->
  <ellipse class="center" cx="100" cy="100" rx="22" ry="18"/>
  <!-- Beak — pointing forward (up) -->
  <path class="beak" d="M100,82 L96,70 Q100,58 104,70 Z"/>
  <!-- Eye dots -->
  <circle cx="93" cy="94" r="2.5" fill="#ffffff"/>
  <circle cx="107" cy="94" r="2.5" fill="#ffffff"/>
</svg>