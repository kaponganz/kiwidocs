<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="200" height="200" shape-rendering="crispEdges">
  <!-- Concept 9: Pixel art quadcopter top-down view -->

  <!-- Prop circles (teal) — top-left -->
  <rect x="1" y="1" width="1" height="1" fill="#00b894"/>
  <rect x="2" y="0" width="1" height="1" fill="#00b894"/>
  <rect x="3" y="1" width="1" height="1" fill="#00b894"/>
  <rect x="0" y="2" width="1" height="1" fill="#00b894"/>
  <rect x="4" y="2" width="1" height="1" fill="#00b894"/>
  <rect x="1" y="3" width="1" height="1" fill="#00b894"/>
  <rect x="3" y="3" width="1" height="1" fill="#00b894"/>
  <rect x="2" y="4" width="1" height="1" fill="#00b894"/>
  <!-- Motor hub -->
  <rect x="2" y="2" width="1" height="1" fill="#1a1a1a"/>

  <!-- Prop — top-right -->
  <rect x="12" y="1" width="1" height="1" fill="#00b894"/>
  <rect x="13" y="0" width="1" height="1" fill="#00b894"/>
  <rect x="14" y="1" width="1" height="1" fill="#00b894"/>
  <rect x="11" y="2" width="1" height="1" fill="#00b894"/>
  <rect x="15" y="2" width="1" height="1" fill="#00b894"/>
  <rect x="12" y="3" width="1" height="1" fill="#00b894"/>
  <rect x="14" y="3" width="1" height="1" fill="#00b894"/>
  <rect x="13" y="4" width="1" height="1" fill="#00b894"/>
  <rect x="13" y="2" width="1" height="1" fill="#1a1a1a"/>

  <!-- Prop — bottom-left -->
  <rect x="2" y="11" width="1" height="1" fill="#00b894"/>
  <rect x="1" y="12" width="1" height="1" fill="#00b894"/>
  <rect x="3" y="12" width="1" height="1" fill="#00b894"/>
  <rect x="0" y="13" width="1" height="1" fill="#00b894"/>
  <rect x="4" y="13" width="1" height="1" fill="#00b894"/>
  <rect x="1" y="14" width="1" height="1" fill="#00b894"/>
  <rect x="3" y="14" width="1" height="1" fill="#00b894"/>
  <rect x="2" y="15" width="1" height="1" fill="#00b894"/>
  <rect x="2" y="13" width="1" height="1" fill="#1a1a1a"/>

  <!-- Prop — bottom-right -->
  <rect x="13" y="11" width="1" height="1" fill="#00b894"/>
  <rect x="12" y="12" width="1" height="1" fill="#00b894"/>
  <rect x="14" y="12" width="1" height="1" fill="#00b894"/>
  <rect x="11" y="13" width="1" height="1" fill="#00b894"/>
  <rect x="15" y="13" width="1" height="1" fill="#00b894"/>
  <rect x="12" y="14" width="1" height="1" fill="#00b894"/>
  <rect x="14" y="14" width="1" height="1" fill="#00b894"/>
  <rect x="13" y="15" width="1" height="1" fill="#00b894"/>
  <rect x="13" y="13" width="1" height="1" fill="#1a1a1a"/>

  <!-- Arms (dark) -->
  <rect x="4" y="4" width="1" height="1" fill="#1a1a1a"/>
  <rect x="5" y="5" width="1" height="1" fill="#1a1a1a"/>
  <rect x="11" y="4" width="1" height="1" fill="#1a1a1a"/>
  <rect x="10" y="5" width="1" height="1" fill="#1a1a1a"/>
  <rect x="4" y="11" width="1" height="1" fill="#1a1a1a"/>
  <rect x="5" y="10" width="1" height="1" fill="#1a1a1a"/>
  <rect x="11" y="11" width="1" height="1" fill="#1a1a1a"/>
  <rect x="10" y="10" width="1" height="1" fill="#1a1a1a"/>

  <!-- Center body -->
  <rect x="6" y="6" width="4" height="4" fill="#1a1a1a"/>

  <!-- Kiwi beak pointing forward (up) -->
  <rect x="7" y="4" width="2" height="1" fill="#00b894"/>
  <rect x="7" y="3" width="2" height="1" fill="#00b894"/>
  <rect x="7" y="5" width="2" height="1" fill="#1a1a1a"/>

  <!-- Eyes on body -->
  <rect x="7" y="7" width="1" height="1" fill="#ffffff"/>
  <rect x="8" y="7" width="1" height="1" fill="#ffffff"/>
</svg>