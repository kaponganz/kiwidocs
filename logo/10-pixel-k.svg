<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="200" height="200" shape-rendering="crispEdges">
  <!-- Concept 10: Pixel K lettermark with propeller accent -->

  <!-- K stem -->
  <rect x="3" y="2" width="2" height="12" fill="#1a1a1a"/>

  <!-- K upper diagonal -->
  <rect x="5" y="7" width="2" height="2" fill="#1a1a1a"/>
  <rect x="7" y="5" width="2" height="2" fill="#1a1a1a"/>
  <rect x="9" y="3" width="2" height="2" fill="#1a1a1a"/>
  <rect x="11" y="2" width="2" height="2" fill="#1a1a1a"/>

  <!-- K lower diagonal -->
  <rect x="7" y="9" width="2" height="2" fill="#1a1a1a"/>
  <rect x="9" y="11" width="2" height="2" fill="#1a1a1a"/>
  <rect x="11" y="12" width="2" height="2" fill="#1a1a1a"/>

  <!-- Propeller at junction (teal accent) -->
  <rect x="5" y="6" width="1" height="1" fill="#00b894"/>
  <rect x="6" y="5" width="1" height="1" fill="#00b894"/>
  <rect x="7" y="8" width="1" height="1" fill="#00b894"/>
  <rect x="6" y="9" width="1" height="1" fill="#00b894"/>

  <!-- Propeller center dot -->
  <rect x="6" y="7" width="1" height="1" fill="#00b894"/>
</svg>